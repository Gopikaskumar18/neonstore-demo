<!DOCTYPE html>
<html lang="en">
<head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-P4W36PMK8K"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-P4W36PMK8K');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonStore | High-Level Online Shopping</title>
<style>
    :root {
        --primary: #6366f1;
        --secondary: #f43f5e;
        --bg: #f8fafc;
        --dark: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--bg); color: var(--dark); }

    /* Top Label Header */
    .site-label {
        background: #111827;
        color: #94a3b8;
        text-align: center;
        padding: 5px;
        font-size: 0.75rem;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    nav {
        background: linear-gradient(90deg, #4f46e5, #9333ea);
        padding: 1rem 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: white;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .logo { font-size: 1.8rem; font-weight: 800; }
    .cart-trigger {
        background: rgba(255,255,255,0.2);
        padding: 8px 15px;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.3s;
    }

    .container {
        max-width: 1200px;
        margin: 40px auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
        padding: 0 20px;
    }

    .card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        transition: 0.3s;
        border: 1px solid #edf2f7;
    }

    .card:hover { transform: translateY(-10px); }

    .card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 15px;
        margin-bottom: 15px;
    }

    .price { font-size: 1.5rem; font-weight: 800; color: var(--secondary); margin: 10px 0; }

    .add-btn {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
    }

    #sidebar {
        position: fixed;
        right: -400px;
        top: 0;
        width: 380px;
        height: 100%;
        background: white;
        transition: 0.4s;
        z-index: 1000;
        padding: 30px;
        display: flex;
        flex-direction: column;
        box-shadow: -10px 0 30px rgba(0,0,0,0.1);
    }

    #sidebar.active { right: 0; }
    .cart-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .cart-item img { width: 50px; height: 50px; border-radius: 8px; }
</style>
</head>
<body>

<div class="site-label">Professional Grade • High-Level Online Shopping</div>

<nav>
    <div class="logo">NEON<span>STORE</span></div>
    <div class="cart-trigger" onclick="toggleCart()">
        🛒 <span id="count">0 Items</span>
    </div>
</nav>

<div class="container" id="grid"></div>

<div id="sidebar">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2>My Basket</h2>
        <button onclick="toggleCart()" style="border:none; background:none; font-size: 1.5rem; cursor:pointer;">✕</button>
    </div>
    <div id="cart-list" style="flex-grow: 1;"></div>
    <div style="border-top: 1px solid #eee; padding-top: 20px;">
        <h3>Total: <span id="total-price">$0.00</span></h3>
        <button class="add-btn" style="background: var(--dark); margin-top: 15px;">Checkout</button>
    </div>
</div>

<script>
const products = [
    { id: 1, name: "Neon Headphones", price: 199, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" },
    { id: 2, name: "Minimalist Watch", price: 250, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" },
    { id: 3, name: "Pro Smart Camera", price: 450, img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500" },
    { id: 4, name: "Vapor Sneakers", price: 120, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" },
    { id: 5, name: "Gaming Laptop", price: 1299, img: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500" },
    { id: 6, name: "Smart Speaker", price: 89, img: "https://images.unsplash.com/photo-1589003077984-894e133dabab?w=500" }
];

let cart = [];

function renderProducts() {
    document.getElementById('grid').innerHTML = products.map(p => `
        <div class="card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p class="price">$${p.price}</p>
            <button class="add-btn" onclick="addToCart(${p.id})">Add to Basket</button>
        </div>
    `).join('');
}

function addToCart(id) {
    const item = products.find(p => p.id === id);
    cart.push(item);
    updateUI();
}

function updateUI() {
    document.getElementById('count').innerText = `${cart.length} Items`;
    document.getElementById('cart-list').innerHTML = cart.map((item, index) => `
        <div class="cart-item">
            <img src="${item.img}">
            <div style="flex-grow:1">
                <h4>${item.name}</h4>
                <p style="color:var(--secondary)">$${item.price}</p>
            </div>
            <button onclick="cart.splice(${index},1); updateUI();" style="color:red; border:none; background:none; cursor:pointer;">Del</button>
        </div>
    `).join('');
    const total = cart.reduce((sum, item) => sum + item.price, 0);
    document.getElementById('total-price').innerText = `$${total.toFixed(2)}`;
}

function toggleCart() { document.getElementById('sidebar').classList.toggle('active'); }

renderProducts();

// ===== GA4 Checkout click tracking =====
const checkoutBtn = document.querySelector('#sidebar .add-btn');

if (checkoutBtn) {
    checkoutBtn.addEventListener('click', () => {
        gtag('event', 'checkout_click', {
            button_name: 'Checkout',
            page_title: document.title,
            cart_total: parseFloat(document.getElementById('total-price').innerText.replace('$','')),
            cart_items: cart.length
        });
        console.log('Checkout clicked - GA4 event sent');
    });
}
</script>
</body>
</html>
